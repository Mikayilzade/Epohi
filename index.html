<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#27382d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Эпохи">
  <meta name="format-detection" content="telephone=no">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <title>Эпохи v1.4.2-alpha — пошаговая стратегия</title>
  <style>
    :root {
      --bg: #18231c;
      --panel: #26382c;
      --panel-2: #314636;
      --paper: #efe5c7;
      --paper-2: #d9caa5;
      --ink: #283229;
      --muted: #7e8f82;
      --gold: #d4ae55;
      --accent: #79a968;
      --accent-2: #527f50;
      --danger: #9b5149;
      --line: rgba(255,255,255,.12);
      --shadow: 0 12px 34px rgba(0,0,0,.28);
      --map-window-width: min(94vw, 430px);
      --map-window-height: min(calc(100dvh - 318px), 480px);
      --tile-size: 46px;
      --tile-gap: 1px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--bg);
    }

    body {
      position: fixed;
      inset: 0;
      height: 100dvh;
      color: #f6f1df;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      padding:
        max(8px, env(safe-area-inset-top))
        max(9px, env(safe-area-inset-right))
        max(9px, env(safe-area-inset-bottom))
        max(9px, env(safe-area-inset-left));
    }

    button {
      appearance: none;
      border: 0;
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    button:disabled {
      cursor: default;
      opacity: .42;
    }

    .app {
      width: min(100%, 620px);
      height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto auto;
      gap: 7px;
      overflow: hidden;
    }

    .topbar {
      min-height: 43px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 4px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(27px, 8vw, 39px);
      font-weight: 700;
      letter-spacing: .5px;
      line-height: .95;
    }

    .brand p {
      margin: 3px 0 0;
      color: #b6c2b8;
      font-size: 12px;
      white-space: nowrap;
    }

    .turn-card {
      flex: 0 0 auto;
      min-width: 86px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      text-align: center;
      box-shadow: inset 0 1px rgba(255,255,255,.06);
    }

    .turn-card small {
      display: block;
      color: #acbbaf;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .turn-card strong {
      display: block;
      margin-top: 2px;
      font-size: 17px;
      line-height: 1.1;
    }


    .resource-switcher {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: -2px 0 -1px;
      color: #dfe9dc;
      font-size: 12px;
    }

    .resource-switcher button {
      width: 28px;
      height: 24px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: #f6f1df;
      font-size: 18px;
      line-height: 20px;
    }

    .resource-switcher strong {
      min-width: 112px;
      text-align: center;
      font-weight: 700;
    }

    .resources {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .resource {
      min-width: 0;
      height: 42px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 5px;
      padding: 5px 7px;
      border-radius: 10px;
      background: rgba(255,255,255,.075);
      border: 1px solid rgba(255,255,255,.08);
    }

    .resource .icon {
      font-size: 18px;
      line-height: 1;
    }

    .resource .numbers {
      min-width: 0;
    }

    .resource strong {
      display: block;
      font-size: 16px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .resource small {
      display: block;
      margin-top: 3px;
      color: #aebbb1;
      font-size: 9px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-zone {
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .map-shell {
      position: relative;
      width: var(--map-window-width);
      height: var(--map-window-height);
      flex: 0 1 var(--map-window-height);
      min-width: min(300px, 100%);
      min-height: 0;
      max-width: 100%;
      max-height: calc(100% - 50px);
      padding: 5px;
      border-radius: 16px;
      background: #0e1711;
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,.08);
      overflow: hidden;
      touch-action: none;
      cursor: grab;
      contain: layout paint;
    }

    .map-shell.dragging {
      cursor: grabbing;
    }

    .map {
      position: absolute;
      left: 5px;
      top: 5px;
      width: calc(var(--tile-size) * var(--map-size, 28) + var(--tile-gap) * (var(--map-size, 28) - 1));
      height: calc(var(--tile-size) * var(--map-size, 28) + var(--tile-gap) * (var(--map-size, 28) - 1));
      display: grid;
      grid-template-columns: repeat(var(--map-size, 28), var(--tile-size));
      grid-template-rows: repeat(var(--map-size, 28), var(--tile-size));
      gap: var(--tile-gap);
      overflow: visible;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      touch-action: none;
      transform-origin: 0 0;
      will-change: transform;
    }

    .tile {
      position: relative;
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 0;
      overflow: hidden;
      border-radius: 2px;
      color: #162019;
      font-size: calc(var(--tile-size) * .46);
      line-height: 1;
      touch-action: none;
      transition: filter 80ms ease, transform 80ms ease, box-shadow 80ms ease;
    }

    .tile:active {
      filter: brightness(1.15);
      transform: scale(.94);
    }

    .tile.selected {
      z-index: 3;
      box-shadow: inset 0 0 0 2px #fff3b1, 0 0 0 1px #26382c;
      filter: brightness(1.1);
    }

    .tile.fog {
      background:
        radial-gradient(circle at 65% 28%, rgba(255,255,255,.04), transparent 34%),
        #17241b;
      color: rgba(255,255,255,.18);
    }

    .tile.plains { background: #91aa69; }
    .tile.forest { background: #527649; }
    .tile.hill { background: #9a8a69; }
    .tile.water { background: #4d8192; }
    .tile.desert { background: #c4a968; }

    .terrain-icon {
      position: relative;
      z-index: 1;
      transform: scale(.86);
      filter: saturate(.9);
    }

    .piece, .feature, .improvement {
      position: absolute;
      display: grid;
      place-items: center;
      text-shadow: 0 1px 2px rgba(0,0,0,.65);
      pointer-events: none;
    }

    .piece {
      z-index: 12;
      font-size: .74em;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.9);
      background: rgba(23,33,25,.9);
      box-shadow: 0 2px 6px rgba(0,0,0,.45), inset 0 1px rgba(255,255,255,.18);
      color: white;
    }

    .phase-banner { position:absolute; left:50%; top:12px; transform:translateX(-50%); z-index:6; padding:7px 12px; border-radius:999px; background:rgba(38,56,44,.92); border:1px solid var(--gold); font-weight:900; box-shadow:var(--shadow); pointer-events:none; }
    .phase-banner.is-hidden { display:none; }
    .tile.ai-territory { box-shadow: inset 0 0 0 2px var(--civ-color, rgba(220,90,90,.7)); }
    .piece.ai-city, .piece.ai-unit { border:2px solid var(--civ-color,#d75a5a); background:#f4edd8; color:#1d241e; font-weight:900; }
    .piece.ai-unit { border-radius:50% 50% 44% 44%; }
    .piece.ai-target { outline:2px solid #f2d36b; }

    .piece.city {
      left: 5%;
      top: 5%;
      width: 58%;
      height: 58%;
      z-index: 13;
      background: linear-gradient(#f4d585, #9f6f2d);
      border-color: #fff2bd;
      color: #26180a;
      text-shadow: 0 1px rgba(255,255,255,.28);
    }

    .feature {
      top: 1px;
      right: 1px;
      z-index: 4;
      font-size: .48em;
    }

    .improvement {
      left: 1px;
      bottom: 1px;
      z-index: 5;
      font-size: .53em;
    }

    .map-controls {
      width: min(100%, 254px);
      height: 44px;
      flex: 0 0 44px;
      display: grid;
      grid-template-columns: 44px minmax(82px, 1fr) 44px 44px;
      gap: 6px;
      align-items: center;
      touch-action: manipulation;
    }

    .map-control-btn {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      padding: 0;
      border-radius: 10px;
      background: rgba(239,229,199,.94);
      border: 1px solid rgba(40,50,41,.24);
      color: #243326;
      font-size: 25px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 3px 10px rgba(0,0,0,.28), inset 0 1px rgba(255,255,255,.45);
      touch-action: manipulation;
    }

    .map-control-btn.center {
      font-size: 22px;
    }

    .map-control-value {
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(239,229,199,.32);
      border-radius: 10px;
      background: rgba(16,24,18,.72);
      color: #f7efd8;
      font-size: 14px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      box-shadow: inset 0 1px rgba(255,255,255,.08);
    }

    .context {
      min-height: 66px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 13px;
      background: var(--paper);
      color: var(--ink);
      box-shadow: 0 5px 18px rgba(0,0,0,.18);
    }

    .context-copy {
      min-width: 0;
    }

    .context-title {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      font-size: 15px;
      line-height: 1.15;
    }

    .context-text {
      margin: 4px 0 0;
      color: #5f695f;
      font-size: 11px;
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .context-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .context-btn {
      min-width: 54px;
      height: 43px;
      padding: 0 9px;
      border-radius: 10px;
      background: var(--accent-2);
      color: white;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.08;
      box-shadow: inset 0 1px rgba(255,255,255,.14);
    }

    .context-btn.alt {
      background: #826b43;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr 1.35fr 48px;
      gap: 7px;
      min-height: 51px;
    }

    .tool-btn {
      min-width: 0;
      height: 51px;
      display: grid;
      place-items: center;
      padding: 4px 7px;
      border-radius: 12px;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,.08);
      color: white;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.08;
      box-shadow: inset 0 1px rgba(255,255,255,.08);
    }

    .tool-btn span {
      display: block;
      font-size: 19px;
      line-height: 1;
      margin-bottom: 2px;
    }

    .tool-btn.end-turn {
      background: linear-gradient(#7eac69, #5f8d56);
      color: #102014;
      font-size: 14px;
      box-shadow: inset 0 1px rgba(255,255,255,.26), 0 2px 8px rgba(0,0,0,.2);
    }

    .tool-btn.menu {
      font-size: 25px;
      line-height: 1;
    }

    .badge-wrap {
      position: relative;
    }

    .badge {
      position: absolute;
      top: 3px;
      right: 7px;
      min-width: 17px;
      height: 17px;
      display: none;
      place-items: center;
      padding: 0 4px;
      border-radius: 9px;
      background: #c0604d;
      color: white;
      font-size: 10px;
      font-weight: 800;
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
    }

    .badge.show { display: grid; }

    .toast {
      position: fixed;
      left: 50%;
      top: max(70px, calc(env(safe-area-inset-top) + 56px));
      z-index: 80;
      width: min(88vw, 420px);
      padding: 10px 13px;
      border-radius: 12px;
      background: rgba(20,31,23,.94);
      border: 1px solid rgba(255,255,255,.13);
      color: white;
      text-align: center;
      font-size: 13px;
      line-height: 1.3;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translate(-50%, -10px);
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 12px max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      background: rgba(4,10,6,.72);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      touch-action: none;
    }

    .modal.show { display: flex; }

    .sheet {
      width: min(100%, 620px);
      max-height: min(82dvh, 760px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 19px;
      background: var(--paper);
      color: var(--ink);
      box-shadow: 0 22px 65px rgba(0,0,0,.5);
      animation: sheetIn 150ms ease-out;
    }

    @keyframes sheetIn {
      from { transform: translateY(18px); opacity: .5; }
      to { transform: translateY(0); opacity: 1; }
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 15px 10px;
      border-bottom: 1px solid rgba(40,50,41,.13);
    }

    .sheet-head h2 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 27px;
      line-height: 1;
    }

    .close-btn {
      width: 39px;
      height: 39px;
      border-radius: 50%;
      background: rgba(40,50,41,.1);
      color: var(--ink);
      font-size: 25px;
      line-height: 1;
    }

    .sheet-scroll {
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      touch-action: pan-y;
      -webkit-overflow-scrolling: touch;
      padding: 13px 14px 18px;
    }

    .section-title {
      margin: 15px 0 8px;
      color: #6c6654;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .section-title:first-child { margin-top: 0; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }

    .summary-card {
      min-width: 0;
      padding: 9px 7px;
      border-radius: 11px;
      background: rgba(65,80,63,.08);
      text-align: center;
    }

    .summary-card strong {
      display: block;
      font-size: 18px;
    }

    .summary-card small {
      display: block;
      margin-top: 2px;
      color: #667066;
      font-size: 10px;
    }

    .progress {
      height: 10px;
      overflow: hidden;
      border-radius: 5px;
      background: rgba(40,50,41,.12);
    }

    .progress > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #6f9e5d, #a9bf69);
      transition: width 180ms ease;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 5px 1px 0;
      color: #626d62;
      font-size: 11px;
    }

    .card-list {
      display: grid;
      gap: 8px;
    }

    .game-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 11px;
      border: 1px solid rgba(40,50,41,.12);
      border-radius: 13px;
      background: rgba(255,255,255,.38);
    }

    .game-card.done {
      background: rgba(83,126,74,.12);
    }

    .game-card.locked {
      opacity: .58;
    }

    .game-card h3 {
      margin: 0;
      font-size: 15px;
      line-height: 1.15;
    }

    .game-card p {
      margin: 4px 0 0;
      color: #687168;
      font-size: 11px;
      line-height: 1.3;
    }

    .card-button {
      min-width: 82px;
      min-height: 42px;
      padding: 6px 10px;
      border-radius: 10px;
      background: var(--accent-2);
      color: white;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.1;
    }

    .card-button.gold { background: #8c7040; }
    .card-button.danger { background: var(--danger); }
    .card-button.neutral { background: #6f756e; }

    .inline-note {
      padding: 10px 11px;
      border-radius: 12px;
      background: rgba(65,80,63,.08);
      color: #586358;
      font-size: 12px;
      line-height: 1.38;
    }

    .built-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      padding: 6px 8px;
      border-radius: 9px;
      background: rgba(65,80,63,.1);
      font-size: 11px;
      font-weight: 700;
    }

    .menu-actions {
      display: grid;
      gap: 8px;
    }

    .wide-btn {
      min-height: 47px;
      padding: 8px 12px;
      border-radius: 12px;
      background: var(--accent-2);
      color: white;
      font-weight: 800;
    }

    .wide-btn.secondary {
      background: #75694f;
    }

    .wide-btn.danger {
      background: var(--danger);
    }

    .wiki-callout {
      padding: 11px 12px;
      border-left: 4px solid var(--accent-2);
      border-radius: 10px;
      background: rgba(82,127,80,.12);
      color: #4f5d50;
      font-size: 12px;
      line-height: 1.45;
    }

    .wiki-list {
      display: grid;
      gap: 7px;
    }

    .wiki-row {
      display: grid;
      grid-template-columns: minmax(108px, .85fr) minmax(0, 1.6fr);
      gap: 10px;
      align-items: start;
      padding: 9px 10px;
      border-radius: 11px;
      background: rgba(65,80,63,.075);
      font-size: 11px;
      line-height: 1.35;
    }

    .wiki-row strong {
      font-size: 12px;
      line-height: 1.25;
    }

    .wiki-row span {
      color: #626d62;
    }

    .wiki-details {
      overflow: hidden;
      border: 1px solid rgba(40,50,41,.12);
      border-radius: 13px;
      background: rgba(255,255,255,.34);
    }

    .wiki-details + .wiki-details { margin-top: 8px; }

    .wiki-details summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      cursor: pointer;
      font-weight: 800;
      list-style: none;
    }

    .wiki-details summary::-webkit-details-marker { display: none; }
    .wiki-details summary::after { content: "⌄"; font-size: 18px; }
    .wiki-details[open] summary::after { transform: rotate(180deg); }

    .wiki-details-body {
      padding: 0 10px 10px;
    }

    .wiki-mini {
      margin-top: 5px;
      color: #687168;
      font-size: 10px;
      font-weight: 500;
      line-height: 1.3;
    }

    .victory-mark {
      display: block;
      margin: 2px auto 10px;
      text-align: center;
      font-size: 58px;
    }

    .victory-copy {
      margin: 0 0 14px;
      text-align: center;
      color: #566156;
      font-size: 14px;
      line-height: 1.45;
    }


    .is-hidden { display: none !important; }
    .screen-root {
      width: min(100%, 620px); height: 100%; margin: 0 auto; overflow: hidden;
      display: flex; flex-direction: column; justify-content: center; touch-action: pan-y;
    }
    .screen-panel {
      max-height: 100%; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
      padding: 18px 14px calc(18px + env(safe-area-inset-bottom)); border: 1px solid var(--line);
      border-radius: 24px; background: linear-gradient(180deg, rgba(49,70,54,.98), rgba(24,35,28,.98));

  function buildImprovementWithWorker(unitId, id, targetX, targetY) {

    const standingBuild = unit.x === x && unit.y === y;
    if (!def || (!standingBuild && !coastalBuild) || !tile.revealed || tile.improvement && !tile.pillaged || !inTerritory(x, y) ||
        def.terrain.indexOf(tile.terrain) === -1 || (def.tech && !hasTech(def.tech)) ||

  function repairImprovement(unitId) {
    const unit = getUnit(unitId); if (!unit || unit.type !== "worker") return;
    const tile = state.map[unit.y][unit.x]; if (!tile.pillaged || state.resources.production < 5) return;
    state.resources.production -= 5; tile.pillaged = false; unit.acted = true; unit.moves = 0;

  function canFoundOutpost(unit) {
    if (!unit || unit.type !== "settler" || unit.acted) return false;
    const tile = state.map[unit.y][unit.x];
    if (!tile.revealed || tile.terrain === "water" || tile.improvement) return false;
    if (state.city.x === unit.x && state.city.y === unit.y) return false;
    if (inTerritory(unit.x, unit.y)) return false;
    if (chebyshev(unit.x, unit.y, state.city.x, state.city.y) < 3) return false;
    return state.settlements.every(function (settlement) {
      return chebyshev(unit.x, unit.y, settlement.x, settlement.y) >= 3;

  }

    const name = "Форпост " + (state.settlements.length + 1);

    revealAround(state, unit.x, unit.y, 1);

    selectedUnitId = state.units.length ? state.units[0].id : null;

  function techUnlocked(id) {

  function projectDef(type, id) {

  function queueProject(type, id) {

    const def = projectDef(queue.type, queue.id);
    state.city.queue = null;
    state.history.unshift("Ход " + state.turn + ": отменён проект «" + def.name + "».");

    openCity();

    const queue = state.city.queue;
    if (!queue || state.resources.production <= 0) return;
    const amount = Math.min(state.resources.production, queue.cost - queue.progress);
    state.resources.production -= amount;
    queue.progress += amount;
    const completed = finishQueueIfReady();
    showToast(completed ? completed.text : "В проект вложено 🔨 " + amount + ".");
    render();
    if (completed && completed.victory) {
      closeModal("cityModal");
      openVictory();

      openCity();
    }
  }

  function addUnit(type) {
    const id = "u" + state.nextUnitId++;
    const def = UNIT_DEFS[type];
    const militaryBonus = (type === "warrior" ? (state.permanentBonuses.militaryHealth || 0) * 10 : 0);
    state.units.push({
      id: id, type: type, x: state.city.x, y: state.city.y,
      moves: 0, acted: false, maxHp: (def.maxHealth || 60) + militaryBonus, hp: (def.maxHealth || 60) + militaryBonus
    });

  }

  function finishQueueIfReady() {
    const queue = state.city.queue;
    if (!queue || queue.progress < queue.cost) return null;
    const def = projectDef(queue.type, queue.id);
    state.city.queue = null;

    if (queue.type === "building") {
      state.city.buildings.push(queue.id);
      state.history.unshift("Ход " + state.turn + ": завершено здание «" + def.name + "».");
      if (queue.id === "palace") state.victory = true;
      return { text: def.icon + " " + def.name + " завершён.", victory: queue.id === "palace" };

    const unitId = addUnit(queue.id);

  }

  function processProduction(amount) {
    if (!state.city.queue) {
      state.resources.production += amount;
      return null;
    }
    state.city.queue.progress += amount;
    const overflow = Math.max(0, state.city.queue.progress - state.city.queue.cost);
    const completed = finishQueueIfReady();
    if (completed && overflow > 0) state.resources.production += overflow;
    return completed;
  }

  function finishResearch() {
    if (!state.currentResearch) return null;
    const tech = TECHS[state.currentResearch];

    const completed = state.currentResearch;
    state.researched.push(completed);

    if (!options.length) return;
    options.sort(function (a, c) { return chebyshev(a.x,a.y,target.x,target.y) - chebyshev(c.x,c.y,target.x,target.y); });
    let next = options[0]; if (b.last && next.x === b.last.x && next.y === b.last.y && options[1]) next = options[1];
    b.last = { x:b.x, y:b.y }; b.x = next.x; b.y = next.y;
  }
  function processBarbarians() {

      if (!tile.camp || tile.camp.hp <= 0) return; tile.camp.nextSpawn -= 1;
      const nearby = (state.barbarians || []).filter(function (b) { return chebyshev(b.x,b.y,x,y) <= 3; }).length;
      if (tile.camp.nextSpawn <= 0 && state.barbarians.length < BARBARIAN.maxRaiders && nearby < 3) {
        const spot = neighborsOf(x,y,mapSizeCells()).find(function (p) { return passableTile(state.map[p.y][p.x]) && !barbarianAt(p.x,p.y) && !unitsAt(p.x,p.y).length; });
        if (spot) { state.barbarians.push({ id:"b" + state.nextBarbarianId++, x:spot.x, y:spot.y, hp:BARBARIAN.raiderHealth, maxHp:BARBARIAN.raiderHealth, homeX:x, homeY:y, last:null }); actions++; }
        tile.camp.nextSpawn = 5 + Math.floor(Math.random() * 4);

  function projectCard(type, id) {
    const def = projectDef(type, id);
    const isBuilding = type === "building";
    const done = isBuilding && hasBuilding(id);
    const locked = def.tech && !hasTech(def.tech);
    const populationLocked = (id === "palace" && state.city.population < 6) ||
      (!isBuilding && state.city.population < def.population);
    const busy = !!state.city.queue;
    const upfront = nonProductionCost(def.cost);
    const affordable = canAfford(upfront);
    let button;
    if (done) button = '<button class="card-button neutral" disabled>Построено</button>';
    else if (locked) button = '<button class="card-button neutral" disabled>Нужно: ' + TECHS[def.tech].name + '</button>';
    else if (populationLocked) button = '<button class="card-button neutral" disabled>Население ' + (isBuilding ? 6 : def.population) + '</button>';
    else if (busy) button = '<button class="card-button neutral" disabled>Очередь занята</button>';
    else button = '<button class="card-button ' + (affordable ? '' : 'neutral') + '" data-queue-type="' + type + '" data-queue-id="' + id + '" ' + (affordable ? '' : 'disabled') + '>' + formatCost(def.cost) + '</button>';

    return '<article class="game-card ' + (done ? 'done' : '') + ' ' + (locked ? 'locked' : '') + '">' +
      '<div><h3>' + def.icon + ' ' + def.name + '</h3><p>' + def.description + '</p></div>' + button + '</article>';
  }

      cards += '<article class="game-card ' + (done ? 'done' : '') + ' ' + (!unlocked ? 'locked' : '') + '">' +
        '<div><h3>' + tech.icon + ' ' + tech.name + '</h3><p>' + tech.unlock + ' · ' + prereqText + '</p></div>' + button + '</article>';

  function setScreen(name) {
    currentScreen = name;
    Array.from(document.querySelectorAll(".modal.show")).forEach(function (m) { m.classList.remove("show"); });
    if (name === "playing") { screenRoot.classList.add("is-hidden"); gameApp.classList.remove("is-hidden"); }
    else { gameApp.classList.add("is-hidden"); screenRoot.classList.remove("is-hidden"); }
    history.replaceState({ screen: name }, "", location.pathname + location.search + "#" + name);
  }
  function renderScreen(html, extraClass) { screenRoot.innerHTML = '<div class="screen-panel' + (extraClass ? ' '+extraClass : '') + '">' + html + '</div>'; }
  function startPlaying(loadedState, campaignId, saveId) {
    const valid = validateSaveState(loadedState);
    if (!valid) { showToast("Не удалось загрузить сохранение. Данные не были удалены", 3600); return; }
    state = valid; activeCampaignId = campaignId || activeCampaignId; activeSaveId = saveId || activeSaveId; loadedSaveId = activeSaveId; loadedSaveTurn = state.turn;
    if (activeCampaignId) safeSet(ACTIVE_CAMPAIGN_KEY, activeCampaignId); if (activeSaveId) safeSet(ACTIVE_SAVE_KEY, activeSaveId);
    selected = null; selectedUnitId = state.units.length ? state.units[0].id : null;
    camera = loadCamera() || { x: 0, y: 0, scale: CAMERA_DEFAULT_SCALE }; cameraInitialized = !!loadCamera();
    setScreen("playing"); render(); initializeCamera(!cameraInitialized);
    if (activeCampaignId && activeSaveId) getCampaign(activeCampaignId).then(function(c){ if(c){ c.lastLoadedSaveId = activeSaveId; c.lastPlayedAt = new Date().toISOString(); putCampaign(c); } });
  }

  function openMainMenu() {
    setScreen("main-menu");
    Promise.all([getCampaigns(), storageEstimateKb()]).then(function(res) {
      const campaigns = res[0].sort(function(a,b){ return String(b.lastPlayedAt).localeCompare(String(a.lastPlayedAt)); }); const approx = res[1];
      const cards = campaigns.length ? campaigns.map(function(c){ return '<article class="slot-card" data-campaign="'+c.campaignId+'"><strong>'+escapeHtml(c.name)+'</strong><small id="line-'+c.campaignId+'">'+c.mapSize+'×'+c.mapSize+' · '+formatDate(c.lastPlayedAt)+'</small><div class="slot-actions"><button data-continue="'+c.campaignId+'" class="menu-primary">Продолжить</button><button data-saves="'+c.campaignId+'" class="menu-primary secondary">Сохранения</button><button data-rename-campaign="'+c.campaignId+'" class="menu-primary secondary">Переименовать</button><button data-delete-campaign="'+c.campaignId+'" class="menu-primary danger">Удалить</button></div></article>'; }).join('') : '<div class="menu-hint">Партий пока нет. Создайте новый мир.</div>';
      renderScreen('<h1 class="menu-title">ЭПОХИ</h1><p class="menu-version">v1.4.2-alpha</p>' + (storageWarning ? '<div class="screen-note">'+escapeHtml(storageWarning)+'</div>' : '') + '<div class="menu-hint">v1.4.2-alpha: варвары воюют со всеми, цивилизации сражаются между собой, а поселенцы основывают настоящие города.<br>Примерный размер данных: '+approx+' КБ.</div><div class="menu-stack"><button id="newGameScreenBtn" class="menu-primary">Новая игра</button><button id="wikiScreenBtn" class="menu-primary secondary">Вики</button><button id="settingsScreenBtn" class="menu-primary ghost">Настройки</button></div><div class="section-title">Партии</div><div class="slot-list">'+cards+'</div>');
      campaigns.forEach(function(c){ getCampaignSaves(c.campaignId).then(function(saves){ const latest=saves[0]; const el=document.getElementById('line-'+c.campaignId); if(el) el.textContent = campaignLine(c, saves.length, latest && latest.turn); }); });
      document.getElementById("newGameScreenBtn").onclick = openNewGameScreen; document.getElementById("wikiScreenBtn").onclick = function(){ setScreen("wiki"); openWiki(); document.querySelector('#wikiModal .close-btn').onclick = function(){ closeModal('wikiModal'); openMainMenu(); }; }; document.getElementById("settingsScreenBtn").onclick = openSettingsScreen;
      screenRoot.querySelectorAll('[data-continue]').forEach(function(b){ b.onclick=function(){ continueCampaign(b.dataset.continue); }; });
      screenRoot.querySelectorAll('[data-saves]').forEach(function(b){ b.onclick=function(){ openCampaignSavesScreen(b.dataset.saves, 'main-menu'); }; });
      screenRoot.querySelectorAll('[data-rename-campaign]').forEach(function(b){ b.onclick=function(){ getCampaign(b.dataset.renameCampaign).then(function(c){ const n=prompt('Новое название партии', c.name); if(!n) return; c.name=n.trim(); putCampaign(c).then(openMainMenu); }); }; });
      screenRoot.querySelectorAll('[data-delete-campaign]').forEach(function(b){ b.onclick=function(){ if(confirm('Удалить партию и все её сохранения?') && confirm('Точно удалить без возможности восстановления?')) deleteCampaign(b.dataset.deleteCampaign).then(openMainMenu); }; });
    });
  }

  function continueCampaign(campaignId) { getCampaign(campaignId).then(function(c){ return getCampaignSaves(campaignId).then(function(saves){ const save = saves.find(function(s){ return s.saveId === c.lastLoadedSaveId; }) || saves.find(function(s){ return s.type === 'autosave'; }) || saves[0]; if(!save) return showToast('У партии нет сохранений'); startPlaying(save.gameState, campaignId, save.saveId); }); }); }
  function storageEstimateKb() { return Promise.all([getCampaigns()]).then(function(res){ return getCampaigns().then(function(cs){ return Promise.all(cs.map(function(c){ return getCampaignSaves(c.campaignId); })).then(function(all){ return Math.round(JSON.stringify(cs).length/1024 + JSON.stringify([].concat.apply([],all).map(function(s){ return { saveId:s.saveId,campaignId:s.campaignId,name:s.name,turn:s.turn,type:s.type,updatedAt:s.updatedAt }; })).length/1024); }); }); }).catch(function(){ return 0; }); }

  function pointerDistance(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function pointerMidpoint(a, b) {
    return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
  }

  function beginGesture() {
    const points = Array.from(activePointers.values());
    mapViewport.classList.remove("dragging");

    if (points.length === 1) {
      gesture = {
        mode: "pan",
        startPoint: { x: points[0].x, y: points[0].y },
        tapTile: points[0].startTile,
        startX: camera.x,
        startY: camera.y,
        moved: false
      };
      return;
    }

    if (points.length >= 2) {
      const first = points[0];
      const second = points[1];
      const midpoint = pointerMidpoint(first, second);
      const distance = Math.max(1, pointerDistance(first, second));
      gesture = {
        mode: "pinch",
        startMidpoint: midpoint,
        startDistance: distance,
        startScale: camera.scale,
        startX: camera.x,
        startY: camera.y,
        anchorX: (midpoint.x - camera.x) / camera.scale,
        anchorY: (midpoint.y - camera.y) / camera.scale,
        moved: true
      };
      touchSequenceHadPinch = true;
      suppressNextMapClick = true;
      mapViewport.classList.add("dragging");
    }
  }

  function updateGesture() {
    if (!gesture) return;
    const points = Array.from(activePointers.values());

    if (gesture.mode === "pan" && points.length === 1) {
      const point = points[0];
      const dx = point.x - gesture.startPoint.x;
      const dy = point.y - gesture.startPoint.y;
      if (Math.abs(dx) > CAMERA_TAP_SLOP || Math.abs(dy) > CAMERA_TAP_SLOP) {
        gesture.moved = true;
        suppressNextMapClick = true;
        mapViewport.classList.add("dragging");
      }
      camera.x = gesture.startX + dx;
      camera.y = gesture.startY + dy;
      applyCamera(gesture.moved);
      return;
    }

    if (points.length >= 2) {
      const first = points[0];
      const second = points[1];
      const midpoint = pointerMidpoint(first, second);
      const distance = Math.max(1, pointerDistance(first, second));
      camera.scale = clamp(gesture.startScale * distance / gesture.startDistance, CAMERA_MIN_SCALE, CAMERA_MAX_SCALE);
      camera.x = midpoint.x - gesture.anchorX * camera.scale;
      camera.y = midpoint.y - gesture.anchorY * camera.scale;
      gesture.moved = true;
      suppressNextMapClick = true;
      mapViewport.classList.add("dragging");
      applyCamera(true);
    }
  }

  function finishPointer(event) {
    const tapTile = !touchSequenceHadPinch && gesture && gesture.mode === "pan" && !gesture.moved && activePointers.size === 1
      ? gesture.tapTile
      : null;
    activePointers.delete(event.pointerId);
    if (gesture && gesture.moved) suppressNextMapClick = true;

    if (activePointers.size) {
      beginGesture();
    } else {
      gesture = null;
      touchSequenceHadPinch = false;
      setTimeout(function () { mapViewport.classList.remove("dragging"); }, 80);
    }

    if (tapTile) {
      suppressNextMapClick = true;
      handleTileClick(tapTile);
    }
  }

  function handleTileClick(tileEl) {
    const x = Number(tileEl.dataset.x);
    const y = Number(tileEl.dataset.y);
    const active = getUnit(selectedUnitId);
    const clickedUnits = unitsAt(x, y);
    const clickedActiveTile = active && active.x === x && active.y === y;
    const clickedDestination = active && !clickedActiveTile && isAdjacent(active.x, active.y, x, y);

    selected = { x: x, y: y };
    if (clickedUnits.length && !clickedDestination) {
      if (clickedActiveTile && clickedUnits.length > 1) cycleUnitAt(x, y);
      else selectedUnitId = clickedUnits[0].id;
    }
    const pc = playerCities().find(function(c){ return c.x === x && c.y === y; });
    if (pc) { selectedCityId = pc.id; setResourceViewCity(pc.id); }
    renderMap();
    renderContext();
  }

  mapEl.addEventListener("click", function (event) {
    if (suppressNextMapClick) {
      suppressNextMapClick = false;
      event.preventDefault();
      event.stopPropagation();
      return;
    }
    const tileEl = event.target.closest(".tile");
    if (!tileEl) return;
    handleTileClick(tileEl);
  });

  mapViewport.addEventListener("pointerdown", function (event) {
    event.preventDefault();

  function canPayLocal(cost, city){ return (city.production||0) >= (cost.production||0) && canAfford(nonProductionCost(cost)); }
  function payLocal(cost, city){ city.production = (city.production||0) - (cost.production||0); pay(nonProductionCost(cost)); }
  function workerBuildReason(unit, x, y, id){ const tile=state.map[y][x], def=id&&IMPROVEMENTS[id], payer=payerCityForTile(x,y); if(unit.acted) return "Рабочий уже выполнил действие в этом ходу."; if(!tile.revealed) return "Клетка не открыта."; if(rivalUnitAt(x,y)||barbarianAt(x,y)||rivalCityAt(x,y)) return "Клетка занята чужим объектом."; if(!inTerritory(x,y)) return "Эта клетка находится за пределами территории."; if(tile.improvement && !tile.pillaged) return "Клетка уже улучшена."; if(!def) return "На этой местности пока нельзя построить улучшение."; if(def.tech && !hasTech(def.tech)) return id==='mine'?'Для шахты нужна технология “Добыча”.':(id==='farm'?'Для фермы нужно изучить “Земледелие”.':'Нужна технология “'+TECHS[def.tech].name+'”.'); if((def.cost.production||0)>(payer.production||0)) return "В городе " + payer.name + " недостаточно производства: " + Math.floor(payer.production||0) + " из " + def.cost.production + "."; if(!canAfford(nonProductionCost(def.cost))) return "Не хватает общих ресурсов."; return null; }
  function improvementForTerrain(tile){ return Object.keys(IMPROVEMENTS).find(function(id){ return IMPROVEMENTS[id].terrain.indexOf(tile.terrain)!==-1; }) || null; }
  function renderInspect(x,y){ const tile=state.map[y][x], ru=rivalUnitAt(x,y), rc=rivalCityAt(x,y), b=barbarianAt(x,y), camp=campAt(x,y); const active=getUnit(selectedUnitId); if(!tile.revealed) return false; if(ru){ const d=UNIT_DEFS[ru.unit.type]; contextTitle.textContent=(ru.civ.symbol||'◆')+' '+d.name; contextText.textContent=ru.civ.name+' · здоровье: '+Math.ceil(ru.unit.hp)+'/'+ru.unit.maxHp+' · атака: '+(d.attack||0)+' · защита: '+(d.defense||0)+' · бонус местности: +'+defenseBonus(x,y)+' · отношения: '+(ru.civ.relation==='war'?'война':'нейтралитет'); }
    else if(rc){ contextTitle.textContent='🏛️ '+rc.city.name; contextText.textContent='Владелец: '+rc.civ.name+' · '+(rc.city.capital?'столица':'город')+' · население '+(rc.city.population||1)+' · здоровье: '+Math.ceil(rc.city.hp)+'/'+rc.city.maxHp+' · базовая защита: 18'+(rc.city.youngUntil&&state.turn<=rc.city.youngUntil?' · молодой':'')+(rc.city.occupied?' · оккупирован':''); }
    else if(b){ contextTitle.textContent='⚔ Варварский налётчик'; contextText.textContent='Здоровье: '+Math.ceil(b.hp)+'/'+b.maxHp+' · атака: '+BARBARIAN.raiderAttack+' · защита: '+BARBARIAN.raiderDefense+' · бонус местности: +'+defenseBonus(x,y); }
    else if(camp){ const live=state.barbarians.filter(function(bb){return bb.homeX===x&&bb.homeY===y;}).length; const rules=barbarianRules(state); const status=live>=2?'достигнут лимит':(camp.nextSpawn<=1?'готовит нового налётчика':'недавно создал налётчика'); contextTitle.textContent='♜ Варварский лагерь'; contextText.textContent='Здоровье: '+camp.hp+'/'+camp.maxHp+' · защита: 12 · живых налётчиков: '+live+' · '+status+' · награда: 25 золота и 6 науки'; }
    else return false; if(active&&canAttack(active,x,y)) contextActions.appendChild(actionButton('Атаковать<br>⚔','danger',function(){attackEnemy(active.id,x,y);},false)); return true; }
  function renderContext() {
    contextActions.innerHTML = ""; const activeUnit=getUnit(selectedUnitId); if(!selected){ contextTitle.textContent=activeUnit?UNIT_DEFS[activeUnit.type].icon+' '+UNIT_DEFS[activeUnit.type].name:'Карта мира'; contextText.textContent=activeUnit?'Выбран юнит. Нажми соседнюю клетку, чтобы приказать ему двигаться.':'Нажми на клетку или произведи юнита в городе.'; return; }
    const x=selected.x,y=selected.y,tile=state.map[y][x], hereUnits=unitsAt(x,y), outpost=settlementAt(x,y); if(activeUnit&&activeUnit.x===x&&activeUnit.y===y){ const def=UNIT_DEFS[activeUnit.type]; contextTitle.textContent=def.icon+' '+def.name; contextText.textContent=def.description+' · здоровье: '+Math.ceil(activeUnit.hp)+'/'+activeUnit.maxHp+' · атака: '+(def.attack||0)+' · защита: '+(def.defense||0)+' · ходов осталось: '+activeUnit.moves; if(activeUnit.type==='worker'){ const payer=payerCityForTile(x,y); if(tile.pillaged&&tile.improvement&&inTerritory(x,y)&&!activeUnit.acted){ const disabled=(payer.production||0)<5; contextActions.appendChild(actionButton('Ремонт 🔨5<br>Оплатит '+payer.name,'alt',function(){repairImprovement(activeUnit.id);},disabled)); if(disabled) contextText.textContent+=' · В городе '+payer.name+' недостаточно производства: '+Math.floor(payer.production||0)+' из 5'; }
      const id=availableImprovement(tile)||improvementForTerrain(tile); const reason=workerBuildReason(activeUnit,x,y,id); if(id&&!tile.pillaged){ const imp=IMPROVEMENTS[id]; contextActions.appendChild(actionButton(imp.name+'<br>'+formatCost(imp.cost)+'<br>Оплатит '+payer.name+' · запас '+Math.floor(payer.production||0),'alt',function(){buildImprovementWithWorker(activeUnit.id,id);},!!reason)); } if(reason && !tile.pillaged) contextText.textContent += ' · ' + reason; }
      if(activeUnit.type==='settler'&&canFoundOutpost(activeUnit)) contextActions.appendChild(actionButton('Основать<br>⛺','alt',function(){foundOutpost(activeUnit.id);},false)); if(hereUnits.length>1) contextActions.appendChild(actionButton('Другой<br>юнит','',function(){cycleUnitAt(x,y);},false)); return; }
    if(renderInspect(x,y)) return; const city=playerCities().find(function(c){return c.x===x&&c.y===y;}); if(city){ contextTitle.textContent='🏛️ '+city.name; contextText.textContent='Население '+city.population+' · территория '+cityRadius(city)+' клетки'; contextActions.appendChild(actionButton('Открыть<br>город','',function(){ selectedCityId=city.id; setResourceViewCity(city.id); openCity();},false)); return; }
    if(!tile.revealed){ contextTitle.textContent='Неизведанная земля'; contextText.textContent='Подведи разведчика или другого юнита к этой клетке.'; } else { const extras=[]; if(tile.feature)extras.push(FEATURES[tile.feature].name); if(tile.poi&&!tile.poi.used)extras.push(INTEREST_TYPES[tile.poi.type].name); if(tile.improvement)extras.push(IMPROVEMENTS[tile.improvement].name+(tile.pillaged?' (разграблено)':'')); if(outpost)extras.push(outpost.name); contextTitle.textContent=TERRAIN[tile.terrain].icon+' '+TERRAIN[tile.terrain].name; contextText.textContent='Доход: '+yieldText(getTileYield(tile))+(extras.length?' · '+extras.join(' · '):''); }
    if(activeUnit&&canAttack(activeUnit,x,y)) contextActions.appendChild(actionButton('Атака<br>⚔','danger',function(){attackEnemy(activeUnit.id,x,y);},false)); if(activeUnit&&canMoveUnitTo(activeUnit,x,y)) contextActions.appendChild(actionButton('Идти<br>'+UNIT_DEFS[activeUnit.type].mapIcon,'',function(){moveUnit(activeUnit.id,x,y);},false)); if(hereUnits.length) contextActions.appendChild(actionButton('Выбрать<br>юнит','alt',function(){selectedUnitId=hereUnits[0].id;render();},false));
  }
  function buildImprovementWithWorker(unitId,id,targetX,targetY){ const unit=getUnit(unitId); if(!unit||unit.type!=='worker')return; const x=targetX==null?unit.x:targetX, y=targetY==null?unit.y:targetY, tile=state.map[y][x], def=IMPROVEMENTS[id], payer=payerCityForTile(x,y); const standing=unit.x===x&&unit.y===y, coastal=id==='harbor'&&isAdjacent(unit.x,unit.y,x,y)&&tile.terrain==='water'; if(!def||(!standing&&!coastal)||workerBuildReason(unit,x,y,id)||!canPayLocal(def.cost,payer))return; payLocal(def.cost,payer); tile.improvement=id; tile.owner=payer.id; tile.pillaged=false; unit.acted=true; unit.moves=0; showToast(IMPROVEMENTS[id].name+' построена. Оплатил '+payer.name+'.'); render(); }
  function repairImprovement(unitId){ const unit=getUnit(unitId); if(!unit||unit.type!=='worker')return; const tile=state.map[unit.y][unit.x], payer=payerCityForTile(unit.x,unit.y); if(!tile.pillaged||!inTerritory(unit.x,unit.y)||unit.acted||(payer.production||0)<5)return; payer.production-=5; tile.pillaged=false; tile.owner=payer.id; unit.acted=true; unit.moves=0; showToast('Ремонт завершён. Оплатил '+payer.name+'.'); render(); }


  function projectCard(type, id) {
    const city = activeCity();
    const def = projectDef(type, id), isBuilding = type === 'building';
    const done = isBuilding && (city.buildings||[]).includes(id);
    const locked = def.tech && !hasTech(def.tech);
    const populationLocked = (id === 'palace' && city.population < 6) || (!isBuilding && city.population < def.population);
    const busy = !!city.queue;
    const affordable = canAfford(nonProductionCost(def.cost));
    let button = done ? '<button class="card-button neutral" disabled>Построено</button>' : locked ? '<button class="card-button neutral" disabled>Нужно: '+TECHS[def.tech].name+'</button>' : populationLocked ? '<button class="card-button neutral" disabled>Население</button>' : busy ? '<button class="card-button neutral" disabled>Очередь занята</button>' : '<button class="card-button '+(affordable?'':'neutral')+'" data-queue-type="'+type+'" data-queue-id="'+id+'" '+(affordable?'':'disabled')+'>'+formatCost(def.cost)+'</button>';
    return '<article class="game-card '+(done?'done':'')+'"><div><h3>'+def.icon+' '+def.name+'</h3><p>'+def.description+'</p></div>'+button+'</article>';
  }
  function openCity() {
    const city = activeCity(); selectedCityId = city.id; setResourceViewCity(city.id);
    const income = cityIncome(city), need = growthNeed(city.population), progress = Math.min(100, (city.food||0) / need * 100);
    const built = (city.buildings||[]).length ? city.buildings.map(id=>'<span class="chip">'+BUILDINGS[id].icon+' '+BUILDINGS[id].name+'</span>').join('') : '<span class="chip">Пока нет зданий</span>';
    const tabs = playerCities().map(c=>'<button class="tiny-btn '+(c.id===city.id?'':'secondary')+'" data-city-select="'+c.id+'">'+escapeHtml(c.name)+'</button>').join('');
    let queueHtml = '<div class="inline-note">Очередь пуста. Производство копится локально в этом городе: 🔨 '+Math.floor(city.production||0)+'.</div>';
    if (city.queue) { const q=city.queue, pct=Math.min(100,q.progress/q.cost*100); queueHtml='<div class="queue-box"><div class="queue-head"><strong>'+projectLabel(q)+'</strong><span>+'+income.production+' 🔨 за ход</span></div><div class="progress"><span style="width:'+pct+'%"></span></div><div class="progress-label"><span>🔨 '+Math.floor(q.progress)+' / '+q.cost+'</span><span>примерно '+Math.max(1,Math.ceil((q.cost-q.progress)/Math.max(1,income.production)))+' ход.</span></div><div class="queue-actions"><button id="rushQueueBtn" class="tiny-btn secondary" '+((city.production||0)>0?'':'disabled')+'>Вложить локальные 🔨 '+Math.floor(city.production||0)+'</button><button id="cancelQueueBtn" class="tiny-btn danger">Отменить</button></div></div>'; }
    cityModalTitle.textContent = city.name;
    cityContent.innerHTML = '<div class="section-title">Города</div><div class="queue-actions">'+tabs+'</div><div class="summary-grid"><div class="summary-card"><strong>'+city.population+'</strong><small>население</small></div><div class="summary-card"><strong>'+Math.floor(city.hp)+'/'+city.maxHp+'</strong><small>здоровье</small></div><div class="summary-card"><strong>'+Math.floor(city.production||0)+'</strong><small>локальное производство</small></div></div><div class="progress"><span style="width:'+progress+'%"></span></div><div class="progress-label"><span>🍞 '+Math.floor(city.food||0)+' / '+need+'</span><span>+'+income.food+' за ход</span></div><div class="section-title">Очередь производства</div>'+queueHtml+'<div class="section-title">Построено</div><div class="built-list">'+built+'</div><div class="section-title">Нанять юнита</div><div class="card-list">'+Object.keys(UNIT_DEFS).map(id=>projectCard('unit',id)).join('')+'</div><div class="section-title">Построить здание</div><div class="card-list">'+Object.keys(BUILDINGS).map(id=>projectCard('building',id)).join('')+'</div>';
    cityContent.querySelectorAll('[data-city-select]').forEach(b=>b.onclick=function(){ selectedCityId=b.dataset.citySelect; setResourceViewCity(selectedCityId); const c=activeCity(); centerCameraOnTile(c.x,c.y,true); openCity(); });
    cityContent.querySelectorAll('[data-queue-type]').forEach(b=>b.onclick=function(){ queueProject(b.dataset.queueType,b.dataset.queueId); });
    const rush=document.getElementById('rushQueueBtn'); if(rush)rush.onclick=rushQueue; const cancel=document.getElementById('cancelQueueBtn'); if(cancel)cancel.onclick=cancelQueue;
    openModal('cityModal');
  }

  if (typeof resourcePrev !== "undefined") resourcePrev.addEventListener("click", function(){ cycleResourceView(-1); });
  if (typeof resourceNext !== "undefined") resourceNext.addEventListener("click", function(){ cycleResourceView(1); });
  cityBtn.addEventListener("click", openCity);
  scienceBtn.addEventListener("click", openScience);
  menuBtn.addEventListener("click", openMenu);
  endTurnBtn.addEventListener("click", endTurn);

  document.addEventListener("click", function (event) {
    const close = event.target.closest("[data-close]");
    if (close) closeModal(close.dataset.close);
    if (event.target.classList && event.target.classList.contains("modal") && event.target.id !== "victoryModal") {
      closeModal(event.target.id);
    }
  });

  document.addEventListener("touchmove", function (event) {
    if (!event.target.closest(".sheet-scroll") && !event.target.closest(".saves-scroll")) event.preventDefault();
  }, { passive: false });

  document.addEventListener("gesturestart", function (event) { event.preventDefault(); }, { passive: false });
  window.addEventListener("contextmenu", function (event) { event.preventDefault(); });
  window.addEventListener("resize", function () { applyCamera(true); });
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
      saveGame();
      saveCamera();
    }
  });
  window.addEventListener("pagehide", function () {
    saveGame();
    saveCamera();
  });

  window.__epohiDebug = function(){ return { state: state, endTurn: endTurn, foundCity: foundCity, canFoundCity: canFoundCity, processBarbarians: processBarbarians, processRivals: processRivals, buildImprovementWithWorker: buildImprovementWithWorker, repairImprovement: repairImprovement, render: render, setResourceViewCity: setResourceViewCity, setResourceViewEmpire: setResourceViewEmpire, cycleResourceView: cycleResourceView, queueProject: queueProject, setActiveCity: function(cityId){ selectedCityId = cityId; } }; };
  openDb().then(function(db){ db.close(); storageAvailable = true; return migrateOldSaveIfNeeded(); }).catch(function(error){ storageAvailable = false; storageWarning = "IndexedDB недоступна: " + error.message + ". Пять слотов отключены, старое localStorage-сохранение не изменяется."; }).finally(function(){
    openMainMenu();
    if (!safeGet(UPDATE_KEY)) { safeSet(UPDATE_KEY, "1"); setTimeout(function(){ showToast("v1.4.2-alpha: варвары воюют со всеми, цивилизации сражаются между собой, а поселенцы основывают настоящие города", 3600); }, 350); }
  });

  if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").catch(function () {});
    });
  }
})();
</script>
